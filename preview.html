<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Preview — DevTemple</title>
    <!-- Elegant Inter Font for Premium UX -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* ── Premium Reset & Base ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b; /* Tailwind Zinc-950 */
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Premium Glassmorphic Top Bar ── */
        #preview-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(24, 24, 27, 0.85); /* Zinc-900 with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 60px;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #preview-bar a, #preview-bar button { transition: all 0.2s ease; }
        #preview-bar a { color: #a1a1aa; font-size: 13px; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        #preview-bar a:hover { color: #fafafa; }
        #preview-title { flex: 1; font-size: 14px; font-weight: 600; color: #f4f4f5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 80px; letter-spacing: -0.2px; }

        /* ── Tabs (Preview / README) ── */
        .tab-group {
            display: flex; gap: 2px; background: rgba(39, 39, 42, 0.6); border-radius: 10px; padding: 4px; flex-shrink: 0; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            background: transparent; border: none; color: #a1a1aa; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.15s; font-family: inherit; letter-spacing: 0.3px; white-space: nowrap;
        }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { background: #18181b; color: #fff; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); }

        /* ── Viewport toggles ── */
        .vp-btns { display: flex; gap: 4px; flex-shrink: 0; background: rgba(39, 39, 42, 0.4); padding: 4px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .vp-btn {
            background: transparent; border: none; color: #a1a1aa; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; transition: 0.15s; display: flex; align-items: center; font-family: inherit;
        }
        .vp-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .vp-btn.active { background: #18181b; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* ── CTA Button ── */
        #buy-btn {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); /* Blue to Purple */
            color: #fff !important; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; text-decoration: none; flex-shrink: 0; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }
        #buy-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }

        /* ── Frame wrapper ── */
        #frame-wrap {
            flex: 1; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 24px; 
            background: radial-gradient(ellipse at center, #18181b 0%, #09090b 100%);
            position: relative; transition: all 0.4s ease; border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        #preview-frame {
            width: 100%; height: 100%; border: none; border-radius: 16px; background: #fff; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            opacity: 0; /* Fade in */
        }
        #preview-frame.loaded { opacity: 1; }

        /* Viewport sizes */
        #frame-wrap.vp-mobile #preview-frame { width: 390px; height: 844px; flex-shrink: 0; border-radius: 32px; }
        #frame-wrap.vp-tablet #preview-frame { width: 768px; height: 1024px; flex-shrink: 0; border-radius: 24px; }
        #frame-wrap.vp-desktop #preview-frame { width: 100%; height: 100%; border-radius: 16px; }

        /* ── Loading States ── */
        #state-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; 
            background: transparent; z-index: 10; border-radius: 16px; transition: opacity 0.4s ease;
        }
        #state-overlay.hidden { opacity: 0; pointer-events: none; }

        .state-spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #state-msg { font-size: 14px; color: #a1a1aa; text-align: center; max-width: 320px; line-height: 1.6; font-weight: 400; }
        #state-msg b { color: #fafafa; }
        #state-msg a { color: #2563eb; }
        
        #progress-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #7c3aed); border-radius: 4px; width: 0%; transition: width 0.3s ease; }

        /* ── Fallbacks ── */
        #no-preview { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; height: 100%; color: #a1a1aa; text-align: center; padding: 40px; }
        #no-preview.visible { display: flex; }
        #no-preview svg { opacity: 0.2; }
        #no-preview p { font-size: 15px; line-height: 1.7; }
        #no-preview a { color: #2563eb; font-weight: 600; text-decoration: none; }
        
        /* ── README Panel ── */
        #readme-panel { display: none; width: 100%; height: 100%; background: #fcfcfd; border-radius: 16px; overflow: auto; padding: 40px 50px; color: #18181b; font-size: 15px; line-height: 1.8; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        #readme-panel.visible { display: block; }
        #readme-panel h1, #readme-panel h2, #readme-panel h3 { margin: 1.5em 0 0.5em; font-weight: 600; }
        #readme-panel h1 { font-size: 2em; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; }
        #readme-panel a { color: #2563eb; }
        #readme-panel .readme-empty { color: #9ca3af; text-align: center; padding: 60px 20px; font-size: 16px; }
        
        @media (max-width: 720px) {
            #preview-bar { padding: 8px 12px; min-height: 50px; gap: 6px; }
            #preview-title { font-size: 12px; min-width: 40px; }
            .tab-btn { padding: 4px 10px; font-size: 11px; }
            .vp-btn { padding: 3px 6px; }
            #buy-btn { padding: 6px 12px; font-size: 12px; }
            #readme-panel { padding: 20px; font-size: 14px; }
            #frame-wrap { padding: 12px; }
        }
        @media (max-width: 480px) {
            #preview-bar .vp-btns .vp-btn span { display: none; }
            #frame-wrap.vp-mobile #preview-frame, #frame-wrap.vp-tablet #preview-frame { width: 100%; height: 100%; border-radius: 12px; }
        }
    </style>
</head>
<body>

    <!-- ─── Top bar ─── -->
    <div id="preview-bar">
        <a href="/" id="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            Back
        </a>

        <span id="preview-title">Loading preview…</span>

        <div class="tab-group">
            <button class="tab-btn active" data-tab="preview">Preview</button>
            <button class="tab-btn" data-tab="readme">README</button>
        </div>

        <div class="vp-btns">
            <button class="vp-btn" data-vp="vp-mobile" title="Mobile">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                <span style="margin-left:4px; font-weight:500;">M</span>
            </button>
            <button class="vp-btn" data-vp="vp-tablet" title="Tablet">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                <span style="margin-left:4px; font-weight:500;">T</span>
            </button>
            <button class="vp-btn active" data-vp="vp-desktop" title="Desktop">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                <span style="margin-left:4px; font-weight:500;">D</span>
            </button>
        </div>

        <a id="buy-btn" href="#">Buy this template →</a>
    </div>

    <!-- ─── Frame ─── -->
    <div id="frame-wrap" class="vp-desktop">
        <div id="state-overlay">
            <div class="state-spinner"></div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="state-msg">Fetching template…</div>
        </div>

        <div id="no-preview">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            <p id="no-preview-msg">No HTML preview available for this product.<br />Purchase to download and view the full files.</p>
            <a id="no-preview-buy" href="#">Buy this template →</a>
        </div>

        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups" title="Template preview"></iframe>

        <div id="readme-panel">
            <div class="readme-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                <p>No README file found in this template.</p>
            </div>
        </div>
    </div>
    <script src="assets/scripts/prmain.js" type="module"></script>

</body>
                </html>
